<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px 16px; }
h1 { text-align: center; font-size: 1.6rem; color: #a78bfa; margin-bottom: 4px; }
.sub { text-align: center; color: #475569; font-size: 0.82rem; margin-bottom: 20px; }
.wrapper { max-width: 520px; margin: 0 auto; }
.box { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.box-title { font-size: 0.8rem; color: #64748b; font-weight: 700; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 12px; }
.notif-btn { display: block; margin: 0 auto 16px; background: #7c3aed; color: white; border: none; padding: 10px 22px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
.notif-btn.ok { background: #15803d; cursor: default; }
.hint { text-align: center; font-size: 0.78rem; color: #f59e0b; margin-bottom: 12px; padding: 8px; background: #1e293b; border-radius: 8px; display: none; }
.hint.show { display: block; }
.sound-list { display: flex; flex-wrap: wrap; gap: 8px; }
.sbtn { background: #0f172a; border: 2px solid #334155; color: #94a3b8; border-radius: 10px; padding: 7px 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600; }
.sbtn.active { border-color: #7c3aed; background: #3b0764; color: #e2e8f0; }
.sbtn:hover { border-color: #7c3aed; color: #e2e8f0; }
.play-btn { background: #334155; border: none; color: #a78bfa; border-radius: 6px; padding: 2px 7px; cursor: pointer; margin-left: 5px; font-size: 0.8rem; }
.clock { text-align: center; margin-bottom: 18px; }
.clock-time { font-size: 2.4rem; font-weight: 800; color: #7c3aed; letter-spacing: 2px; }
.clock-date { font-size: 0.8rem; color: #475569; margin-top: 2px; text-align: center; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav button { background: #334155; border: none; color: #e2e8f0; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 1.1rem; }
.cal-nav button:hover { background: #7c3aed; }
.cal-month { font-weight: 700; font-size: 1rem; color: #a78bfa; }
.cal-days { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.cal-days::-webkit-scrollbar { display: none; }
.cal-day { flex-shrink: 0; width: 48px; background: #0f172a; border-radius: 10px; text-align: center; padding: 8px 4px; cursor: pointer; border: 2px solid transparent; }
.cal-day:hover { background: #334155; }
.cal-day.today { border-color: #7c3aed; }
.cal-day.selected { background: #7c3aed; border-color: #7c3aed; }
.cal-day .dn { font-size: 0.65rem; color: #64748b; text-transform: uppercase; }
.cal-day.selected .dn { color: #ddd6fe; }
.cal-day .dd { font-size: 1.1rem; font-weight: 700; }
.cal-day .dot { height: 5px; display: flex; justify-content: center; margin-top: 3px; }
.cal-day .dot i { width: 5px; height: 5px; background: #f59e0b; border-radius: 50%; display: block; }
.cal-day.selected .dot i { background: white; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 0.78rem; color: #64748b; margin-bottom: 4px; font-weight: 600; }
.field input, .field textarea { width: 100%; background: #0f172a; border: 1.5px solid #334155; color: #e2e8f0; border-radius: 9px; padding: 9px 12px; font-size: 0.92rem; outline: none; font-family: inherit; }
.field input:focus, .field textarea:focus { border-color: #7c3aed; }
.field textarea { resize: vertical; min-height: 56px; }
.time-row { display: flex; gap: 8px; align-items: flex-end; }
.time-inp { display: flex; gap: 6px; align-items: center; flex: 1; }
.time-inp input { width: 70px; text-align: center; font-size: 1.3rem; font-weight: 700; padding: 8px 6px; }
.colon { font-size: 1.5rem; font-weight: 700; color: #7c3aed; }
.add-btn { background: #7c3aed; color: white; border: none; padding: 10px 20px; border-radius: 9px; cursor: pointer; font-size: 0.95rem; font-weight: 700; white-space: nowrap; }
.add-btn:hover { background: #6d28d9; }
.task-item { background: #0f172a; border-radius: 10px; padding: 11px 14px; display: flex; align-items: center; gap: 10px; border-left: 3px solid #7c3aed; margin-bottom: 8px; }
.task-item.done { border-left-color: #15803d; opacity: 0.55; }
.t-time { font-size: 1.1rem; font-weight: 800; color: #a78bfa; min-width: 52px; }
.task-item.done .t-time { color: #475569; }
.t-body { flex: 1; }
.t-name { font-size: 0.92rem; font-weight: 600; }
.task-item.done .t-name { text-decoration: line-through; color: #64748b; }
.t-note { font-size: 0.78rem; color: #64748b; margin-top: 2px; }
.t-done { width: 20px; height: 20px; accent-color: #7c3aed; cursor: pointer; }
.t-del { background: none; border: none; color: #475569; cursor: pointer; font-size: 1rem; }
.t-del:hover { color: #ef4444; }
.empty { text-align: center; color: #334155; padding: 24px 0; font-size: 0.88rem; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.85); z-index: 999; align-items: center; justify-content: center; flex-direction: column; }
.overlay.show { display: flex; }
.alarm-card { background: #1e293b; border: 2px solid #7c3aed; border-radius: 20px; padding: 36px 28px; max-width: 340px; width: 90%; text-align: center; animation: glow 0.8s infinite alternate; }
@keyframes glow { from { box-shadow: 0 0 16px #7c3aed55; } to { box-shadow: 0 0 40px #7c3aedcc; } }
.alarm-time { font-size: 2rem; font-weight: 800; color: #a78bfa; margin-bottom: 8px; }
.alarm-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 20px; }
.alarm-note { font-size: 0.85rem; color: #94a3b8; margin-top: -12px; margin-bottom: 20px; }
.dismiss-btn { background: #7c3aed; color: white; border: none; padding: 12px 36px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 700; }
</style>
</head>
<body>
<div class="wrapper">
  <h1>Task Planner</h1>
  <p class="sub">Set a time and get an alarm when it arrives</p>
  <button class="notif-btn" id="notifBtn" onclick="enableNotifs()">Enable Notifications</button>
  <p class="hint" id="hint">Tap anywhere to enable alarm sounds</p>
  <div class="box">
    <div class="box-title">Alarm Sound</div>
    <div class="sound-list" id="soundList"></div>
  </div>
  <div class="clock">
    <div class="clock-time" id="clk">00:00:00</div>
    <div class="clock-date" id="clkDate"></div>
  </div>
  <div class="box">
    <div class="cal-nav">
      <button onclick="shiftMonth(-1)">&#8249;</button>
      <span class="cal-month" id="calMonth"></span>
      <button onclick="shiftMonth(1)">&#8250;</button>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>
  <div class="box">
    <div class="box-title">Add Task - <span id="addLabel" style="color:#a78bfa">Today</span></div>
    <div class="field"><label>TASK NAME</label><input type="text" id="tName" placeholder="e.g. Doctor, Meeting..." maxlength="80"></div>
    <div class="field"><label>NOTE (optional)</label><textarea id="tNote" placeholder="Extra details..."></textarea></div>
    <div class="field"><label>ALARM TIME</label>
      <div class="time-row">
        <div class="time-inp"><input type="number" id="tHour" min="0" max="23" placeholder="HH"><span class="colon">:</span><input type="number" id="tMin" min="0" max="59" placeholder="MM"></div>
        <button class="add-btn" onclick="addTask()">+ Add</button>
      </div>
    </div>
  </div>
  <div class="box">
    <div class="box-title">Tasks - <span id="listLabel" style="color:#a78bfa">Today</span></div>
    <div id="taskList"></div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="alarm-card">
    <div class="alarm-time" id="alarmTime"></div>
    <div class="alarm-name" id="alarmName"></div>
    <div class="alarm-note" id="alarmNote"></div>
    <button class="dismiss-btn" onclick="dismissAlarm()">Dismiss</button>
  </div>
</div>
<script>

var tasks = JSON.parse(localStorage.getItem('tp4') || '{}');
var selDate = todayKey();
var viewY, viewM, alarmInterval = null;
var selSound = localStorage.getItem('tp_snd') || 'classic';
var audioReady = false;
var audioCtx = null;

/* ── WAV GENERATOR (works on all mobile browsers) ────────────────────── */
function makeWav(samples, sampleRate) {
  var n = samples.length;
  var buf = new ArrayBuffer(44 + n * 2);
  var dv = new DataView(buf);
  function str(off, s) { for(var i=0;i<s.length;i++) dv.setUint8(off+i, s.charCodeAt(i)); }
  str(0,'RIFF'); dv.setUint32(4, 36+n*2, true);
  str(8,'WAVEfmt '); dv.setUint32(16,16,true); dv.setUint16(20,1,true); dv.setUint16(22,1,true);
  dv.setUint32(24,sampleRate,true); dv.setUint32(28,sampleRate*2,true);
  dv.setUint16(32,2,true); dv.setUint16(34,16,true);
  str(36,'data'); dv.setUint32(40,n*2,true);
  for(var i=0;i<n;i++) dv.setInt16(44+i*2, Math.max(-32767,Math.min(32767,samples[i])),true);
  var bin=''; new Uint8Array(buf).forEach(function(b){bin+=String.fromCharCode(b);});
  return 'data:audio/wav;base64,'+btoa(bin);
}

function sineWave(sr, hz, startMs, durMs, vol) {
  var start=Math.floor(sr*startMs/1000), len=Math.floor(sr*durMs/1000);
  var out=[]; vol=vol||0.7;
  for(var i=0;i<len;i++){
    var env=Math.min(1,Math.min(i,len-i)/Math.min(50,len/4));
    out.push(Math.round(Math.sin(2*Math.PI*hz*(start+i)/sr)*env*vol*32767));
  }
  return {samples:out, offset:start};
}

function buildSound(sr, totalMs, parts) {
  var total=Math.ceil(sr*totalMs/1000);
  var buf=new Float32Array(total);
  parts.forEach(function(p){
    var start=Math.floor(sr*p.startMs/1000);
    var len=Math.floor(sr*p.durMs/1000);
    var vol=p.vol||0.7;
    for(var i=0;i<len;i++){
      var env=Math.min(1,Math.min(i+1,len-i)/Math.min(60,len/3));
      var sample=Math.sin(2*Math.PI*p.hz*(start+i)/sr)*env*vol;
      if(start+i<total) buf[start+i]+=sample;
    }
  });
  var out=[];
  for(var i=0;i<total;i++) out.push(Math.round(Math.max(-1,Math.min(1,buf[i]))*32767));
  return makeWav(out, sr);
}

var SR = 22050;
var SOUND_DATA = {};

function initSounds() {
  SOUND_DATA['classic'] = buildSound(SR, 1000, [
    {hz:880,startMs:0,durMs:250},{hz:880,startMs:320,durMs:250},{hz:880,startMs:640,durMs:250}
  ]);
  SOUND_DATA['phone'] = buildSound(SR, 1500, [
    {hz:480,startMs:0,durMs:400,vol:0.5},{hz:620,startMs:0,durMs:400,vol:0.5},
    {hz:480,startMs:550,durMs:400,vol:0.5},{hz:620,startMs:550,durMs:400,vol:0.5},
    {hz:480,startMs:1100,durMs:400,vol:0.5},{hz:620,startMs:1100,durMs:400,vol:0.5}
  ]);
  SOUND_DATA['chime'] = buildSound(SR, 1500, [
    {hz:1047,startMs:0,durMs:400},{hz:880,startMs:250,durMs:400},
    {hz:784,startMs:500,durMs:400},{hz:698,startMs:750,durMs:400},{hz:659,startMs:1000,durMs:500}
  ]);
  var sirenSamples=[]; var sirenLen=Math.ceil(SR*2);
  for(var i=0;i<sirenLen;i++){
    var t=i/SR; var cycle=t%0.8;
    var freq=400+500*(cycle<0.4?cycle/0.4:(0.8-cycle)/0.4);
    sirenSamples.push(Math.round(Math.sin(2*Math.PI*freq*t)*0.4*32767));
  }
  SOUND_DATA['siren'] = makeWav(sirenSamples, SR);
  var digSamples=[]; var digLen=Math.ceil(SR*1.2);
  for(var i=0;i<digLen;i++){
    var slot=Math.floor(i/(SR*0.12));
    var inSlot=(i%(Math.ceil(SR*0.12)))<Math.ceil(SR*0.07);
    var hz2=slot%2===0?1200:900;
    digSamples.push(inSlot?Math.round(Math.sign(Math.sin(2*Math.PI*hz2*i/SR))*0.3*32767):0);
  }
  SOUND_DATA['digital'] = makeWav(digSamples, SR);
  SOUND_DATA['gentle'] = buildSound(SR, 1500, [
    {hz:523,startMs:0,durMs:600,vol:0.3},{hz:659,startMs:350,durMs:600,vol:0.3},
    {hz:784,startMs:700,durMs:600,vol:0.3},{hz:1047,startMs:1050,durMs:600,vol:0.3}
  ]);
  var almSamples=[]; var almLen=Math.ceil(SR*1.5);
  for(var i=0;i<almLen;i++){
    var slot2=Math.floor(i/(SR*0.07));
    var hz3=slot2%2===0?750:850;
    var inSlot2=(i%(Math.ceil(SR*0.07)))<Math.ceil(SR*0.05);
    almSamples.push(inSlot2?Math.round(Math.sign(Math.sin(2*Math.PI*hz3*i/SR))*0.35*32767):0);
  }
  SOUND_DATA['alarm'] = makeWav(almSamples, SR);
  var pulseLen=Math.ceil(SR*2);
  var pulseTimes=[0,0.3,0.6,1.1,1.4,1.7];
  var pulseBuf=new Float32Array(pulseLen);
  pulseTimes.forEach(function(pt){
    var start=Math.floor(pt*SR), dur=Math.floor(0.2*SR);
    for(var i=0;i<dur;i++){
      var freq=160-100*(i/dur);
      var env=1-i/dur;
      pulseBuf[start+i]=(pulseBuf[start+i]||0)+Math.sin(2*Math.PI*freq*(start+i)/SR)*env*0.7;
    }
  });
  var pulseOut=[];
  for(var i=0;i<pulseLen;i++) pulseOut.push(Math.round(Math.max(-1,Math.min(1,pulseBuf[i]))*32767));
  SOUND_DATA['pulse'] = makeWav(pulseOut, SR);
}

/* ── AUDIO PLAYBACK ───────────────────────────────────────────────────── */
var currentAudio = null;

function playSound(id) {
  stopSound();
  var data = SOUND_DATA[id] || SOUND_DATA['classic'];
  var audio = new Audio(data);
  audio.volume = 1.0;
  currentAudio = audio;
  var p = audio.play();
  if(p && p.catch) p.catch(function(e){ console.log('Audio play failed:', e); });
}

function stopSound() {
  if(currentAudio){ currentAudio.pause(); currentAudio.currentTime=0; currentAudio=null; }
  if(alarmInterval){ clearInterval(alarmInterval); alarmInterval=null; }
}

/* ── UNLOCK audio on first interaction ────────────────────────────────── */
var unlocked = false;
function unlock() {
  if(unlocked) return;
  unlocked = true;
  document.getElementById('hint').classList.remove('show');
  var a = new Audio(SOUND_DATA['classic']);
  a.volume = 0.01;
  var p = a.play();
  if(p) p.then(function(){a.pause();}).catch(function(){});
}
document.addEventListener('click', unlock);
document.addEventListener('touchstart', unlock);

/* ── SOUNDS UI ────────────────────────────────────────────────────────── */
var SOUNDS = [
  {id:'classic',label:'Classic Beep'},{id:'phone',label:'Phone Ring'},
  {id:'chime',label:'Chime'},{id:'siren',label:'Siren'},
  {id:'digital',label:'Digital'},{id:'gentle',label:'Gentle'},
  {id:'alarm',label:'Alarm Clock'},{id:'pulse',label:'Pulse'}
];

function renderSounds() {
  var el=document.getElementById('soundList'); el.innerHTML='';
  SOUNDS.forEach(function(s){
    var btn=document.createElement('button'); btn.className='sbtn'+(s.id===selSound?' active':''); btn.textContent=s.label; btn.dataset.id=s.id;
    var play=document.createElement('button'); play.className='play-btn'; play.textContent='Play'; play.dataset.id=s.id;
    play.addEventListener('click',function(e){e.stopPropagation();unlock();playSound(this.dataset.id);});
    btn.addEventListener('click',function(){unlock();selSound=this.dataset.id;localStorage.setItem('tp_snd',selSound);renderSounds();});
    btn.appendChild(play); el.appendChild(btn);
  });
}

/* ── CLOCK ────────────────────────────────────────────────────────────── */
function pad(n){return String(n).padStart(2,'0');}
function updateClock(){
  var n=new Date();
  document.getElementById('clk').textContent=pad(n.getHours())+':'+pad(n.getMinutes())+':'+pad(n.getSeconds());
  var days=['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clkDate').textContent=days[n.getDay()]+', '+months[n.getMonth()]+' '+n.getDate()+', '+n.getFullYear();
}

/* ── STORAGE ──────────────────────────────────────────────────────────── */
function save(){localStorage.setItem('tp4',JSON.stringify(tasks));}
function todayKey(){var d=new Date();return d.getFullYear()+'-'+pad(d.getMonth()+1)+'-'+pad(d.getDate());}
function fmtKey(y,m,d){return y+'-'+pad(m+1)+'-'+pad(d);}
function fmtDisp(k){var p=k.split('-'),mn=['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec'];return mn[+p[1]-1]+' '+(+p[2])+', '+p[0];}

/* ── CALENDAR ─────────────────────────────────────────────────────────── */
function initCal(){var n=new Date();viewY=n.getFullYear();viewM=n.getMonth();renderCal();}
function shiftMonth(d){viewM+=d;if(viewM<0){viewM=11;viewY--;}if(viewM>11){viewM=0;viewY++;}renderCal();}
function renderCal(){
  var mnames=['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonth').textContent=mnames[viewM]+' '+viewY;
  var c=document.getElementById('calDays');c.innerHTML='';
  var dim=new Date(viewY,viewM+1,0).getDate(),dn=['Sun','Mon','Tue','Wed','Thu','Fri','Sat'],today=todayKey();
  for(var d=1;d<=dim;d++){
    (function(day){
      var key=fmtKey(viewY,viewM,day),dow=new Date(viewY,viewM,day).getDay();
      var el=document.createElement('div');
      el.className='cal-day'+(key===today?' today':'')+(key===selDate?' selected':'');
      el.innerHTML='<div class="dn">'+dn[dow]+'</div><div class="dd">'+day+'</div><div class="dot">'+(tasks[key]&&tasks[key].length?'<i></i>':'')+'</div>';
      el.addEventListener('click',function(){selectDay(key);});
      c.appendChild(el);
      if(key===today&&key===selDate)setTimeout(function(){el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});},100);
    })(d);
  }
}
function selectDay(key){
  selDate=key;
  var lbl=key===todayKey()?'Today':fmtDisp(key);
  document.getElementById('addLabel').textContent=lbl;
  document.getElementById('listLabel').textContent=lbl;
  renderCal();renderTasks();
}

/* ── TASKS ────────────────────────────────────────────────────────────── */
function addTask(){
  var name=document.getElementById('tName').value.trim();
  if(!name){document.getElementById('tName').style.borderColor='#ef4444';return;}
  var hr=document.getElementById('tHour').value,mr=document.getElementById('tMin').value;
  if(hr===''||mr===''){alert('Enter hour and minute.');return;}
  var h=Math.max(0,Math.min(23,+hr)),m=Math.max(0,Math.min(59,+mr));
  var note=document.getElementById('tNote').value.trim();
  if(!tasks[selDate])tasks[selDate]=[];
  tasks[selDate].push({id:Date.now(),name:name,note:note,time:pad(h)+':'+pad(m),done:false});
  save();
  document.getElementById('tName').value='';document.getElementById('tNote').value='';
  document.getElementById('tHour').value='';document.getElementById('tMin').value='';
  document.getElementById('tName').style.borderColor='';
  renderCal();renderTasks();
}
function toggleDone(id){var t=(tasks[selDate]||[]).find(function(x){return x.id===id;});if(t){t.done=!t.done;save();renderTasks();}}
function delTask(id){if(!tasks[selDate])return;tasks[selDate]=tasks[selDate].filter(function(x){return x.id!==id;});if(!tasks[selDate].length)delete tasks[selDate];save();renderCal();renderTasks();}
function renderTasks(){
  var list=(tasks[selDate]||[]).slice().sort(function(a,b){return a.time.localeCompare(b.time);});
  var c=document.getElementById('taskList');c.innerHTML='';
  if(!list.length){c.innerHTML='<div class="empty">No tasks for this day.<br>Add one above.</div>';return;}
  list.forEach(function(t){
    var div=document.createElement('div');div.className='task-item'+(t.done?' done':'');
    var tt=document.createElement('div');tt.className='t-time';tt.textContent=t.time;
    var tb=document.createElement('div');tb.className='t-body';
    var tn=document.createElement('div');tn.className='t-name';tn.textContent=t.name;tb.appendChild(tn);
    if(t.note){var no=document.createElement('div');no.className='t-note';no.textContent=t.note;tb.appendChild(no);}
    var chk=document.createElement('input');chk.type='checkbox';chk.className='t-done';chk.checked=t.done;
    (function(tid){chk.addEventListener('change',function(){toggleDone(tid);});})(t.id);
    var del=document.createElement('button');del.className='t-del';del.textContent='X';
    (function(tid){del.addEventListener('click',function(){delTask(tid);});})(t.id);
    div.appendChild(tt);div.appendChild(tb);div.appendChild(chk);div.appendChild(del);c.appendChild(div);
  });
}

/* ── ALARM CHECK ──────────────────────────────────────────────────────── */
function checkAlarms(){
  var n=new Date(),key=todayKey(),tn=pad(n.getHours())+':'+pad(n.getMinutes());
  (tasks[key]||[]).forEach(function(t){
    if(!t.done&&t.time===tn&&!t._fired){t._fired=true;save();triggerAlarm(t);}
  });
}
function triggerAlarm(t){
  document.getElementById('alarmTime').textContent=t.time;
  document.getElementById('alarmName').textContent=t.name;
  document.getElementById('alarmNote').textContent=t.note||'';
  document.getElementById('overlay').classList.add('show');
  if(Notification.permission==='granted') new Notification('Alarm: '+t.time+' - '+t.name,{body:t.note||'Alarm ringing!',requireInteraction:true});
  playSound(selSound);
  alarmInterval=setInterval(function(){playSound(selSound);},3500);
}
function dismissAlarm(){document.getElementById('overlay').classList.remove('show');stopSound();}

/* ── NOTIFICATIONS ────────────────────────────────────────────────────── */
function enableNotifs(){
  if(!('Notification' in window)){alert('Not supported.');return;}
  Notification.requestPermission().then(function(p){updateNotifBtn(p);});
}
function updateNotifBtn(p){
  var b=document.getElementById('notifBtn');
  if(p==='granted'){b.textContent='Notifications Enabled';b.classList.add('ok');b.disabled=true;}
  else{b.textContent='Enable Notifications';b.classList.remove('ok');}
}

/* ── INIT ─────────────────────────────────────────────────────────────── */
initSounds();
renderSounds();initCal();renderTasks();updateNotifBtn(Notification.permission);
setInterval(updateClock,1000);updateClock();
setInterval(checkAlarms,10000);checkAlarms();
setTimeout(function(){if(!unlocked)document.getElementById('hint').classList.add('show');},1500);
document.getElementById('tName').addEventListener('keydown',function(e){if(e.key==='Enter')addTask();});
document.getElementById('tHour').addEventListener('blur',function(){if(this.value!=='')this.value=Math.max(0,Math.min(23,+this.value));});
document.getElementById('tMin').addEventListener('blur',function(){if(this.value!=='')this.value=Math.max(0,Math.min(59,+this.value));});

</script>
