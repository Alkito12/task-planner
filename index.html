<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Task Planner</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: 'Segoe UI', sans-serif; background: #0f172a; color: #e2e8f0; min-height: 100vh; padding: 24px 16px; }
h1 { text-align: center; font-size: 1.6rem; color: #a78bfa; margin-bottom: 4px; }
.subtitle { text-align: center; color: #475569; font-size: 0.82rem; margin-bottom: 20px; }
.notif-bar { display: flex; justify-content: center; margin-bottom: 16px; }
.notif-btn { background: #7c3aed; color: white; border: none; padding: 10px 22px; border-radius: 10px; cursor: pointer; font-size: 0.9rem; font-weight: 600; }
.notif-btn:hover { background: #6d28d9; }
.notif-btn.ok { background: #15803d; cursor: default; }
.wrapper { max-width: 520px; margin: 0 auto; }
.sound-box { background: #1e293b; border-radius: 14px; padding: 14px 16px; margin-bottom: 16px; }
.sound-box h2 { font-size: 0.82rem; color: #64748b; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 10px; }
.sound-list { display: flex; flex-wrap: wrap; gap: 8px; }
.sound-btn { display: flex; align-items: center; gap: 6px; background: #0f172a; border: 2px solid #334155; color: #94a3b8; border-radius: 10px; padding: 7px 12px; cursor: pointer; font-size: 0.85rem; font-weight: 600; transition: all 0.15s; }
.sound-btn:hover { border-color: #7c3aed; color: #e2e8f0; }
.sound-btn.active { border-color: #7c3aed; background: #3b0764; color: #e2e8f0; }
.preview-btn { background: none; border: none; color: #a78bfa; cursor: pointer; font-size: 0.9rem; padding: 0; line-height: 1; }
.preview-btn:hover { color: #f59e0b; }
.clock-bar { text-align: center; margin-bottom: 18px; }
.clock { font-size: 2.4rem; font-weight: 800; color: #7c3aed; letter-spacing: 2px; }
.clock-date { font-size: 0.8rem; color: #475569; margin-top: 2px; }
.cal-strip { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.cal-nav { display: flex; align-items: center; justify-content: space-between; margin-bottom: 12px; }
.cal-nav button { background: #334155; border: none; color: #e2e8f0; width: 30px; height: 30px; border-radius: 8px; cursor: pointer; font-size: 1rem; }
.cal-nav button:hover { background: #7c3aed; }
.cal-month { font-weight: 700; font-size: 1rem; color: #a78bfa; }
.cal-days { display: flex; gap: 6px; overflow-x: auto; padding-bottom: 4px; scrollbar-width: none; }
.cal-days::-webkit-scrollbar { display: none; }
.cal-day { flex-shrink: 0; width: 48px; background: #0f172a; border-radius: 10px; text-align: center; padding: 8px 4px; cursor: pointer; border: 2px solid transparent; transition: all 0.15s; }
.cal-day:hover { background: #334155; }
.cal-day.today { border-color: #7c3aed; }
.cal-day.selected { background: #7c3aed; border-color: #7c3aed; }
.cal-day .dn { font-size: 0.65rem; color: #64748b; text-transform: uppercase; }
.cal-day.selected .dn { color: #ddd6fe; }
.cal-day .dd { font-size: 1.1rem; font-weight: 700; }
.cal-day .dot { height: 5px; display: flex; justify-content: center; margin-top: 3px; }
.cal-day .dot span { width: 5px; height: 5px; background: #f59e0b; border-radius: 50%; }
.cal-day.selected .dot span { background: white; }
.add-box { background: #1e293b; border-radius: 14px; padding: 16px; margin-bottom: 16px; }
.add-box h2 { font-size: 0.82rem; color: #64748b; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.field { margin-bottom: 10px; }
.field label { display: block; font-size: 0.78rem; color: #64748b; margin-bottom: 4px; font-weight: 600; }
.field input, .field textarea { width: 100%; background: #0f172a; border: 1.5px solid #334155; color: #e2e8f0; border-radius: 9px; padding: 9px 12px; font-size: 0.92rem; outline: none; font-family: inherit; transition: border-color 0.2s; }
.field input:focus, .field textarea:focus { border-color: #7c3aed; }
.field textarea { resize: vertical; min-height: 56px; }
.time-row { display: flex; gap: 8px; align-items: flex-end; }
.time-inputs { display: flex; gap: 6px; align-items: center; flex: 1; }
.time-inputs input[type=number] { width: 70px; text-align: center; font-size: 1.3rem; font-weight: 700; padding: 8px 6px; }
.time-sep { font-size: 1.5rem; font-weight: 700; color: #7c3aed; line-height: 1; padding-bottom: 4px; }
.add-btn { background: #7c3aed; color: white; border: none; padding: 10px 20px; border-radius: 9px; cursor: pointer; font-size: 0.95rem; font-weight: 700; white-space: nowrap; }
.add-btn:hover { background: #6d28d9; }
.tasks-box { background: #1e293b; border-radius: 14px; padding: 16px; }
.tasks-box h2 { font-size: 0.82rem; color: #64748b; margin-bottom: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px; }
.task-list { display: flex; flex-direction: column; gap: 8px; }
.task-item { background: #0f172a; border-radius: 10px; padding: 11px 14px; display: flex; align-items: center; gap: 10px; border-left: 3px solid #7c3aed; }
.task-item.done { border-left-color: #15803d; opacity: 0.55; }
.task-item.done .t-name { text-decoration: line-through; color: #64748b; }
.t-time { font-size: 1.15rem; font-weight: 800; color: #a78bfa; min-width: 52px; text-align: center; }
.task-item.done .t-time { color: #475569; }
.t-body { flex: 1; }
.t-name { font-size: 0.92rem; font-weight: 600; }
.t-note { font-size: 0.78rem; color: #64748b; margin-top: 2px; }
.t-done { width: 20px; height: 20px; accent-color: #7c3aed; cursor: pointer; flex-shrink: 0; }
.t-del { background: none; border: none; color: #475569; cursor: pointer; font-size: 1rem; flex-shrink: 0; }
.t-del:hover { color: #ef4444; }
.empty { text-align: center; color: #334155; padding: 24px 0; font-size: 0.88rem; }
.overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.75); z-index: 999; align-items: center; justify-content: center; }
.overlay.show { display: flex; }
.alarm-card { background: #1e293b; border: 2px solid #7c3aed; border-radius: 20px; padding: 36px 28px; max-width: 340px; width: 90%; text-align: center; animation: glow 0.8s infinite alternate; }
@keyframes glow { from { box-shadow: 0 0 16px #7c3aed55; } to { box-shadow: 0 0 40px #7c3aedcc; } }
.alarm-icon { font-size: 3.5rem; margin-bottom: 10px; }
.alarm-time { font-size: 2rem; font-weight: 800; color: #a78bfa; margin-bottom: 6px; }
.alarm-name { font-size: 1.1rem; font-weight: 600; margin-bottom: 18px; }
.alarm-note { font-size: 0.85rem; color: #94a3b8; margin-bottom: 18px; margin-top: -10px; }
.alarm-dismiss { background: #7c3aed; color: white; border: none; padding: 12px 36px; border-radius: 10px; cursor: pointer; font-size: 1rem; font-weight: 700; }
</style>
</head>
<body>
<div class="wrapper">
  <h1>Task Planner</h1>
  <p class="subtitle">Set a time and get an alarm when it arrives</p>
  <div class="notif-bar"><button class="notif-btn" id="notifBtn" onclick="enableNotifs()">Enable Notifications</button></div>
  <div class="sound-box">
    <h2>Alarm Sound</h2>
    <div class="sound-list" id="soundList"></div>
  </div>
  <div class="clock-bar">
    <div class="clock" id="clock">00:00:00</div>
    <div class="clock-date" id="clockDate"></div>
  </div>
  <div class="cal-strip">
    <div class="cal-nav">
      <button onclick="shiftMonth(-1)">&lsaquo;</button>
      <span class="cal-month" id="calMonth"></span>
      <button onclick="shiftMonth(1)">&rsaquo;</button>
    </div>
    <div class="cal-days" id="calDays"></div>
  </div>
  <div class="add-box">
    <h2>Add Task &mdash; <span id="addLabel" style="color:#a78bfa">Today</span></h2>
    <div class="field"><label>TASK NAME</label><input type="text" id="taskName" placeholder="e.g. Call doctor, Meeting..." maxlength="80"></div>
    <div class="field"><label>NOTE (optional)</label><textarea id="taskNote" placeholder="Extra details..."></textarea></div>
    <div class="field"><label>ALARM TIME</label>
      <div class="time-row">
        <div class="time-inputs">
          <input type="number" id="taskHour" min="0" max="23" placeholder="HH">
          <span class="time-sep">:</span>
          <input type="number" id="taskMin" min="0" max="59" placeholder="MM">
        </div>
        <button class="add-btn" onclick="addTask()">+ Add</button>
      </div>
    </div>
  </div>
  <div class="tasks-box">
    <h2>Tasks &mdash; <span id="listLabel" style="color:#a78bfa">Today</span></h2>
    <div class="task-list" id="taskList"></div>
  </div>
</div>
<div class="overlay" id="overlay">
  <div class="alarm-card">
    <div class="alarm-icon">&#128276;</div>
    <div class="alarm-time" id="alarmTime"></div>
    <div class="alarm-name" id="alarmName"></div>
    <div class="alarm-note" id="alarmNote"></div>
    <button class="alarm-dismiss" onclick="dismissAlarm()">Dismiss</button>
  </div>
</div>
<script>
var tasks = JSON.parse(localStorage.getItem('tp3') || '{}');
var selectedDate = todayKey();
var viewYear, viewMonth, beepInterval = null;
var selectedSound = localStorage.getItem('tp_sound') || 'classic';

function save() { localStorage.setItem('tp3', JSON.stringify(tasks)); }
function todayKey() { var d = new Date(); return fmtKey(d.getFullYear(), d.getMonth(), d.getDate()); }
function fmtKey(y, m, d) { return y + '-' + pad(m+1) + '-' + pad(d); }
function pad(n) { return String(n).padStart(2,'0'); }
function fmtDisplay(key) { var p = key.split('-'); var mn = ['Jan','Feb','Mar','Apr','May','Jun','Jul','Aug','Sep','Oct','Nov','Dec']; return mn[+p[1]-1] + ' ' + (+p[2]) + ', ' + p[0]; }

var SOUNDS = [
  {id:'classic', label:'Classic Beep'},
  {id:'phone',   label:'Phone Ring'},
  {id:'chime',   label:'Chime'},
  {id:'siren',   label:'Siren'},
  {id:'digital', label:'Digital'},
  {id:'gentle',  label:'Gentle'},
  {id:'alarm',   label:'Alarm Clock'},
  {id:'pulse',   label:'Pulse'}
];

function getCtx() { return new (window.AudioContext || window.webkitAudioContext)(); }

function playSound(id) {
  try {
    var ctx = getCtx();
    if (id === 'classic') playClassic(ctx);
    else if (id === 'phone') playPhone(ctx);
    else if (id === 'chime') playChime(ctx);
    else if (id === 'siren') playSiren(ctx);
    else if (id === 'digital') playDigital(ctx);
    else if (id === 'gentle') playGentle(ctx);
    else if (id === 'alarm') playAlarmClock(ctx);
    else if (id === 'pulse') playPulse(ctx);
  } catch(e) {}
}

function tone(ctx, freq, type, start, dur, vol) {
  var o = ctx.createOscillator(), g = ctx.createGain();
  o.connect(g); g.connect(ctx.destination);
  o.type = type || 'sine'; o.frequency.value = freq;
  g.gain.setValueAtTime(0, ctx.currentTime + start);
  g.gain.linearRampToValueAtTime(vol || 0.4, ctx.currentTime + start + 0.05);
  g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + start + dur);
  o.start(ctx.currentTime + start); o.stop(ctx.currentTime + start + dur + 0.01);
}

function playClassic(ctx) { [0, 0.35, 0.7].forEach(function(t) { tone(ctx, 880, 'sine', t, 0.3); }); }
function playPhone(ctx) { [0, 0.5, 1.1].forEach(function(t) { tone(ctx, 480, 'sine', t, 0.38); tone(ctx, 620, 'sine', t, 0.38); }); }
function playChime(ctx) { [1047,880,784,698,659].forEach(function(f,i) { tone(ctx, f, 'sine', i*0.22, 0.55, 0.4); }); }
function playSiren(ctx) {
  [0,1,2].forEach(function(offset) {
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type = 'sawtooth';
    var t = ctx.currentTime + offset;
    o.frequency.setValueAtTime(400, t);
    o.frequency.linearRampToValueAtTime(900, t+0.4);
    o.frequency.linearRampToValueAtTime(400, t+0.8);
    g.gain.setValueAtTime(0.3, t); g.gain.setValueAtTime(0, t+0.85);
    o.start(t); o.stop(t+0.9);
  });
}
function playDigital(ctx) { for(var i=0;i<8;i++) { tone(ctx, i%2===0?1200:900, 'square', i*0.12, 0.08, 0.2); } }
function playGentle(ctx) { [523,659,784,1047].forEach(function(f,i) { tone(ctx, f, 'sine', i*0.3, 0.7, 0.2); }); }
function playAlarmClock(ctx) { for(var i=0;i<16;i++) { tone(ctx, i%2===0?750:850, 'square', i*0.075, 0.05, 0.25); } }
function playPulse(ctx) {
  [0,0.3,0.6,1.1,1.4,1.7].forEach(function(t) {
    var o = ctx.createOscillator(), g = ctx.createGain();
    o.connect(g); g.connect(ctx.destination); o.type = 'sine';
    o.frequency.setValueAtTime(160, ctx.currentTime+t);
    o.frequency.exponentialRampToValueAtTime(60, ctx.currentTime+t+0.15);
    g.gain.setValueAtTime(0.6, ctx.currentTime+t);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime+t+0.2);
    o.start(ctx.currentTime+t); o.stop(ctx.currentTime+t+0.22);
  });
}

function renderSoundPicker() {
  var html = '';
  SOUNDS.forEach(function(s) {
    html += '<button class="sound-btn' + (s.id === selectedSound ? ' active' : '') + '" onclick="selectSound('' + s.id + '')">' +
      s.label + ' <button class="preview-btn" onclick="event.stopPropagation();playSound('' + s.id + '')">&#9654;</button></button>';
  });
  document.getElementById('soundList').innerHTML = html;
}
function selectSound(id) { selectedSound = id; localStorage.setItem('tp_sound', id); renderSoundPicker(); }

function updateClock() {
  var now = new Date();
  document.getElementById('clock').textContent = pad(now.getHours()) + ':' + pad(now.getMinutes()) + ':' + pad(now.getSeconds());
  var days = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('clockDate').textContent = days[now.getDay()] + ', ' + months[now.getMonth()] + ' ' + now.getDate() + ', ' + now.getFullYear();
}

function initCal() { var n = new Date(); viewYear = n.getFullYear(); viewMonth = n.getMonth(); renderCal(); }
function shiftMonth(d) { viewMonth += d; if(viewMonth<0){viewMonth=11;viewYear--;} if(viewMonth>11){viewMonth=0;viewYear++;} renderCal(); }

function renderCal() {
  var months = ['January','February','March','April','May','June','July','August','September','October','November','December'];
  document.getElementById('calMonth').textContent = months[viewMonth] + ' ' + viewYear;
  var c = document.getElementById('calDays'); c.innerHTML = '';
  var dim = new Date(viewYear, viewMonth+1, 0).getDate();
  var dn = ['Sun','Mon','Tue','Wed','Thu','Fri','Sat'], today = todayKey();
  for(var d=1; d<=dim; d++) {
    var key = fmtKey(viewYear, viewMonth, d);
    var dow = new Date(viewYear, viewMonth, d).getDay();
    var el = document.createElement('div');
    el.className = 'cal-day' + (key===today?' today':'') + (key===selectedDate?' selected':'');
    el.innerHTML = '<div class="dn">'+dn[dow]+'</div><div class="dd">'+d+'</div><div class="dot">'+(tasks[key]&&tasks[key].length?'<span></span>':'')+'</div>';
    (function(k){ el.onclick = function(){ selectDay(k); }; })(key);
    c.appendChild(el);
    if(key===today&&key===selectedDate) setTimeout(function(){el.scrollIntoView({behavior:'smooth',inline:'center',block:'nearest'});},100);
  }
}

function selectDay(key) {
  selectedDate = key;
  var label = key===todayKey()?'Today':fmtDisplay(key);
  document.getElementById('addLabel').textContent = label;
  document.getElementById('listLabel').textContent = label;
  renderCal(); renderTasks();
}

function addTask() {
  var name = document.getElementById('taskName').value.trim();
  if(!name) { document.getElementById('taskName').style.borderColor='#ef4444'; return; }
  var hr = document.getElementById('taskHour').value, mr = document.getElementById('taskMin').value;
  if(hr===''||mr==='') { alert('Please enter hour and minute.'); return; }
  var h = Math.max(0,Math.min(23,+hr)), m = Math.max(0,Math.min(59,+mr));
  var time = pad(h)+':'+pad(m), note = document.getElementById('taskNote').value.trim();
  if(!tasks[selectedDate]) tasks[selectedDate]=[];
  tasks[selectedDate].push({id:Date.now(),name:name,note:note,time:time,done:false});
  save();
  document.getElementById('taskName').value=''; document.getElementById('taskNote').value='';
  document.getElementById('taskHour').value=''; document.getElementById('taskMin').value='';
  document.getElementById('taskName').style.borderColor='';
  renderCal(); renderTasks();
}

function toggleDone(dk, id) { var t=(tasks[dk]||[]).find(function(t){return t.id===id;}); if(t){t.done=!t.done;save();renderTasks();} }
function deleteTask(dk, id) { if(!tasks[dk])return; tasks[dk]=tasks[dk].filter(function(t){return t.id!==id;}); if(!tasks[dk].length)delete tasks[dk]; save();renderCal();renderTasks(); }

function renderTasks() {
  var list=(tasks[selectedDate]||[]).slice().sort(function(a,b){return a.time.localeCompare(b.time);});
  var c=document.getElementById('taskList');
  if(!list.length){c.innerHTML='<div class="empty">No tasks for this day.<br>Add one above</div>';return;}
  c.innerHTML=list.map(function(t){
    return '<div class="task-item'+(t.done?' done':'')+'">'+
      '<div class="t-time">'+t.time+'</div>'+
      '<div class="t-body"><div class="t-name">'+esc(t.name)+'</div>'+(t.note?'<div class="t-note">'+esc(t.note)+'</div>':'')+'</div>'+
      '<input type="checkbox" class="t-done"'+(t.done?' checked':'')+' onchange="toggleDone(''+selectedDate+'','+t.id+')">'+
      '<button class="t-del" onclick="deleteTask(''+selectedDate+'','+t.id+')">&#x2715;</button>'+
      '</div>';
  }).join('');
}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');}

function checkAlarms() {
  var now=new Date(), key=todayKey(), tn=pad(now.getHours())+':'+pad(now.getMinutes());
  (tasks[key]||[]).forEach(function(t){ if(!t.done&&t.time===tn&&!t._fired){t._fired=true;save();triggerAlarm(t);} });
}

function triggerAlarm(task) {
  document.getElementById('alarmTime').textContent = task.time;
  document.getElementById('alarmName').textContent = task.name;
  document.getElementById('alarmNote').textContent = task.note||'';
  document.getElementById('overlay').classList.add('show');
  if(Notification.permission==='granted') {
    new Notification('Alarm: '+task.time+' - '+task.name, {body: task.note||'Your alarm is ringing!', requireInteraction:true});
  }
  startBeep();
}
function startBeep() { stopBeep(); playSound(selectedSound); beepInterval=setInterval(function(){playSound(selectedSound);},3000); }
function stopBeep() { if(beepInterval){clearInterval(beepInterval);beepInterval=null;} }
function dismissAlarm() { document.getElementById('overlay').classList.remove('show'); stopBeep(); }

function enableNotifs() {
  if(!('Notification' in window)){alert('Notifications not supported.');return;}
  Notification.requestPermission().then(function(p){ updateNotifBtn(p); });
}
function updateNotifBtn(p) {
  var btn=document.getElementById('notifBtn');
  if(p==='granted'){btn.textContent='Notifications Enabled';btn.classList.add('ok');btn.disabled=true;}
  else{btn.textContent='Enable Notifications';btn.classList.remove('ok');}
}

renderSoundPicker(); initCal(); renderTasks(); updateNotifBtn(Notification.permission);
setInterval(updateClock,1000); updateClock();
setInterval(checkAlarms,10000); checkAlarms();
document.getElementById('taskName').addEventListener('keydown',function(e){if(e.key==='Enter')addTask();});
document.getElementById('taskHour').addEventListener('blur',function(){if(this.value!=='')this.value=Math.max(0,Math.min(23,+this.value));});
document.getElementById('taskMin').addEventListener('blur',function(){if(this.value!=='')this.value=Math.max(0,Math.min(59,+this.value));});
</script>
</body>
</html>
